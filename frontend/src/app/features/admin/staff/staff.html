<div class="space-y-6">

    <div class="flex items-center justify-between">
        <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">Staff
            Management</h1>
        <button (click)="toggleForm()"
            class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2 rounded-lg font-medium shadow-lg shadow-blue-500/30 transition-all flex items-center gap-2">
            <span *ngIf="!showForm">+ Create Staff</span>
            <span *ngIf="showForm">✖ Close Form</span>
        </button>
    </div>

    <!-- CREATE STAFF FORM -->
    <div *ngIf="showForm"
        class="bg-slate-800/80 p-8 rounded-2xl border border-slate-700/50 shadow-lg backdrop-blur-md animate-in fade-in slide-in-from-top-4 duration-300">
        <h3 class="text-xl font-bold text-white mb-6">Create New Staff Account</h3>

        <form class="space-y-6" (ngSubmit)="submitNewStaff()">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                <div class="space-y-2">
                    <label class="text-sm font-medium text-slate-300">Full Name</label>
                    <input type="text" placeholder="e.g. John Doe" name="fullName" [(ngModel)]="newStaff.fullName"
                        class="w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
                </div>

                <div class="space-y-2">
                    <label class="text-sm font-medium text-slate-300">Email Address</label>
                    <input type="email" placeholder="john@cyberassure.com" name="email" [(ngModel)]="newStaff.email"
                        class="w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
                </div>

                <div class="space-y-2">
                    <label class="text-sm font-medium text-slate-300">Phone</label>
                    <input type="tel" placeholder="+1 (555) 000-0000"
                        class="w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
                </div>

                <div class="space-y-2">
                    <label class="text-sm font-medium text-slate-300">Role</label>
                    <select name="roleName" [(ngModel)]="newStaff.roleName"
                        class="w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all appearance-none">
                        <option value="" disabled selected>Select a role...</option>
                        <option value="ROLE_UNDERWRITER">Underwriter</option>
                        <option value="ROLE_CLAIMS_OFFICER">Claims Officer</option>
                    </select>
                </div>

                <div class="space-y-2">
                    <label class="text-sm font-medium text-slate-300">Department</label>
                    <input type="text" placeholder="e.g. Risk Assessment"
                        class="w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
                </div>

                <div class="space-y-2">
                    <label class="text-sm font-medium text-slate-300">Temporary Password</label>
                    <input type="password" placeholder="••••••••" name="password" [(ngModel)]="newStaff.password"
                        class="w-full bg-slate-900/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
                </div>

            </div>

            <div class="flex items-center justify-end gap-3 pt-4 border-t border-slate-700/50">
                <button type="button" (click)="toggleForm()"
                    class="px-5 py-2.5 rounded-lg text-slate-300 hover:text-white hover:bg-slate-800 transition-colors font-medium">Cancel</button>
                <button type="reset"
                    class="px-5 py-2.5 rounded-lg text-slate-300 border border-slate-700 hover:bg-slate-800 transition-colors font-medium">Reset</button>
                <button type="submit"
                    class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2.5 rounded-lg font-medium shadow-lg shadow-blue-500/30 transition-all">Create
                    Staff</button>
            </div>
        </form>
    </div>

    <!-- STAFF TABLE -->
    <div class="bg-slate-800/60 p-6 rounded-2xl border border-slate-700/50 shadow-lg backdrop-blur-md">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-lg font-bold text-white">Staff Directory</h3>
            <div class="flex gap-2">
                <input type="text" placeholder="Search staff..."
                    class="bg-slate-900/50 border border-slate-700 rounded-lg px-3 py-1.5 text-sm text-white focus:outline-none focus:border-blue-500 transition-all">
                <select
                    class="bg-slate-900/50 border border-slate-700 rounded-lg px-3 py-1.5 text-sm text-slate-300 focus:outline-none focus:border-blue-500 transition-all">
                    <option value="ALL">All Roles</option>
                    <option value="UNDERWRITER">Underwriters</option>
                    <option value="CLAIMS_OFFICER">Claims Officers</option>
                </select>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left text-sm whitespace-nowrap">
                <thead>
                    <tr class="text-slate-400 border-b border-slate-700">
                        <th class="pb-3 font-medium px-4">Staff ID</th>
                        <th class="pb-3 font-medium px-4">Name</th>
                        <th class="pb-3 font-medium px-4">Email</th>
                        <th class="pb-3 font-medium px-4">Role</th>
                        <th class="pb-3 font-medium px-4">Department</th>
                        <th class="pb-3 font-medium px-4">Status</th>
                        <th class="pb-3 font-medium px-4 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-700/50">
                    <tr *ngFor="let staff of staffMembers" class="hover:bg-slate-700/20 transition-colors group">
                        <td class="py-3 px-4 font-medium text-slate-300">{{staff.id}}</td>
                        <td class="py-3 px-4">
                            <div class="flex items-center gap-3">
                                <div
                                    class="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center font-bold text-slate-300 text-xs">
                                </div>
                                <span class="text-white font-medium">{{staff.fullName}}</span>
                            </div>
                        </td>
                        <td class="py-3 px-4 text-slate-400">{{staff.email}}</td>
                        <td class="py-3 px-4">
                            <span class="text-slate-300">{{staff.role?.roleName}}</span>
                        </td>
                        <td class="py-3 px-4 text-slate-400">CyberAssure Internal</td>
                        <td class="py-3 px-4">
                            <span class="px-2.5 py-1 rounded-full text-xs font-medium border" [ngClass]="{
                                    'bg-emerald-500/10 text-emerald-400 border-emerald-500/20': staff.accountStatus === 'ACTIVE',
                                    'bg-slate-500/10 text-slate-400 border-slate-500/20': staff.accountStatus === 'INACTIVE'
                                }">
                                {{staff.accountStatus}}
                            </span>
                        </td>
                        <td class="py-3 px-4 text-right space-x-2 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button
                                class="text-blue-400 hover:text-blue-300 text-xs font-medium bg-blue-400/10 px-2 py-1 rounded border border-blue-400/20">Edit</button>
                            <button
                                class="text-amber-400 hover:text-amber-300 text-xs font-medium bg-amber-400/10 px-2 py-1 rounded border border-amber-400/20">Deactivate</button>
                            <button
                                class="text-slate-300 hover:text-white text-xs font-medium bg-slate-700 px-2 py-1 rounded border border-slate-600">Profile</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="flex items-center justify-between mt-6 pt-4 border-t border-slate-700/50 text-sm text-slate-400">
            <span>Showing 1 to 3 of 3 entries</span>
            <div class="flex gap-2">
                <button
                    class="px-3 py-1 rounded border border-slate-700 hover:bg-slate-800 disabled:opacity-50">Previous</button>
                <button class="px-3 py-1 rounded bg-blue-600 text-white font-medium">1</button>
                <button
                    class="px-3 py-1 rounded border border-slate-700 hover:bg-slate-800 disabled:opacity-50">Next</button>
            </div>
        </div>

    </div>

</div>
