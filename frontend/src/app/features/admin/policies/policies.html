<div class="space-y-6">

    <h1 class="text-3xl font-bold text-white">
        Policies Portfolio
    </h1>

    <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">

        <table class="w-full text-left text-sm">

            <thead>
                <tr class="text-slate-400 border-b border-slate-700">
                    <th class="pb-3">Policy ID</th>
                    <th class="pb-3">Customer</th>
                    <th class="pb-3">Coverage</th>
                    <th class="pb-3">Premium</th>
                    <th class="pb-3">Status</th>
                </tr>
            </thead>

            <tbody class="divide-y divide-slate-700">

                <tr *ngFor="let pol of policiesList">

                    <td class="py-3 text-white">
                        {{pol.id}}
                    </td>

                    <td class="py-3 text-white">
                        {{pol.customer?.fullName}}
                    </td>

                    <td class="py-3 text-emerald-400">
                        ₹{{pol.coverageAmount || pol.coverage}}
                    </td>

                    <td class="py-3 text-slate-300">
                        ₹{{pol.premium || pol.premiumAmount}}
                    </td>

                    <td class="py-3">

                        <span class="px-2 py-1 text-xs font-medium" [ngClass]="{
'text-green-400': pol.status === 'APPROVED',
'text-yellow-400': pol.status === 'PENDING',
'text-red-400': pol.status === 'REJECTED'
}">
                            {{pol.status}}
                        </span>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>
