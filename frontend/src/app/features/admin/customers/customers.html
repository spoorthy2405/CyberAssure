<div class="space-y-6">

    <h1 class="text-3xl font-bold text-white">
        Registered Customers
    </h1>

    <!-- SEARCH BAR -->

    <div class="flex justify-between items-center">

        <input type="text" [(ngModel)]="searchText" (ngModelChange)="search()" placeholder="Search customers..."
            class="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-sm text-white w-72" />

        <span class="text-slate-400 text-sm">
            Total: {{filteredCustomers.length}}
        </span>

    </div>

    <!-- TABLE -->

    <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">

        <table class="w-full text-left text-sm">

            <thead>
                <tr class="text-slate-400 border-b border-slate-700">

                    <!-- <th class="pb-3">ID</th> -->
                    <th class="pb-3">Customer-Name</th>
                    <th class="pb-3">Email</th>
                    <th class="pb-3">Phone</th>
                    <th class="pb-3">Role</th>
                    <th class="pb-3">Status</th>

                </tr>
            </thead>

            <tbody class="divide-y divide-slate-700">

                <tr *ngFor="let cust of paginatedCustomers">



                    <td class="py-3 text-white">
                        {{cust.fullName}}
                    </td>

                    <td class="py-3 text-slate-300">
                        {{cust.email}}
                    </td>

                    <td class="py-3 text-slate-300">
                        {{cust.phoneNumber}}
                    </td>

                    <td class="py-3 text-slate-300">
                        {{cust.role?.roleName}}
                    </td>

                    <td class="py-3 text-emerald-400 font-medium">
                        {{cust.accountStatus}}
                    </td>

                </tr>

            </tbody>

        </table>

    </div>

    <!-- PAGINATION -->

    <div class="flex justify-between items-center">

        <button (click)="prevPage()" class="bg-slate-700 px-4 py-2 rounded-lg text-white text-sm">
            Previous
        </button>

        <span class="text-slate-400">
            Page {{page}}
        </span>

        <button (click)="nextPage()" class="bg-slate-700 px-4 py-2 rounded-lg text-white text-sm">
            Next
        </button>

    </div>

</div>
