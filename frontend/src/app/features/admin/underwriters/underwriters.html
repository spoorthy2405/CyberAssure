<div class="space-y-6">

  <h1 class="text-3xl font-bold text-white">Underwriters</h1>

  <div class="bg-slate-800/60 p-6 rounded-xl">

    <table class="w-full text-sm text-left">

      <thead class="text-slate-400 border-b border-slate-700">
        <tr>
          <th class="p-3">Name</th>
          <th class="p-3">Email</th>
          <th class="p-3">Role</th>
          <th class="p-3">Status</th>
        </tr>
      </thead>

      <tbody>

        @for (und of underwritersList(); track und) {
          <tr>
            <td class="p-3 flex items-center gap-2">
              {{und.fullName}}
            </td>
            <td class="p-3">{{und.email}}</td>
            <td class="p-3">{{und.role.roleName}}</td>
            <td class="p-3">{{und.accountStatus}}</td>
          </tr>
        }

      </tbody>

    </table>

  </div>

</div>
