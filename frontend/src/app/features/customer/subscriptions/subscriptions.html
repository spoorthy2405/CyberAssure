<h2 class="text-2xl font-bold mb-6 text-white">
    Your Policy Subscriptions
</h2>

<table class="w-full bg-slate-800 text-white rounded">

    <thead class="bg-slate-700">

        <tr>

            <th class="p-3">Policy</th>
            <th class="p-3">Premium</th>
            <th class="p-3">Status</th>
            <th class="p-3">Start Date</th>

        </tr>

    </thead>

    <tbody>

        <tr *ngFor="let s of subscriptions">

            <td class="p-3">

                {{s.policy.policyName}}

            </td>

            <td class="p-3">

                ₹ {{s.calculatedPremium}}

            </td>

            <td class="p-3">

                <span class="bg-blue-700 px-3 py-1 rounded">

                    {{s.status}}

                </span>

            </td>

            <td class="p-3">

                {{s.startDate}}

            </td>

        </tr>

    </tbody>

</table>
