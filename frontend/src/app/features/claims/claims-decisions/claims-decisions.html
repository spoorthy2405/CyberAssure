<h2 class="text-2xl font-bold mb-6 text-white">
    Claims Decisions
</h2>

<table class="w-full bg-slate-800 rounded-xl overflow-hidden text-white">

    <thead class="bg-slate-700 text-left">

        <tr>
            <th class="p-4">Claim ID</th>
            <th class="p-4">Amount</th>
            <th class="p-4">Decision</th>
            <th class="p-4">Reason</th>
        </tr>

    </thead>

    <tbody>

        <tr *ngFor="let c of claims" class="border-b border-slate-700 hover:bg-slate-700">

            <td class="p-4">
                #{{c.id}}
            </td>

            <td class="p-4">
                ₹ {{c.claimAmount}}
            </td>

            <td class="p-4">

                <span *ngIf="c.status==='APPROVED'" class="bg-green-700 text-green-200 px-3 py-1 rounded text-sm">

                    Approved

                </span>

                <span *ngIf="c.status==='REJECTED'" class="bg-red-700 text-red-200 px-3 py-1 rounded text-sm">

                    Rejected

                </span>

            </td>

            <td class="p-4 text-gray-300">
                {{c.rejectionReason || '—'}}
            </td>

        </tr>

    </tbody>

</table>
