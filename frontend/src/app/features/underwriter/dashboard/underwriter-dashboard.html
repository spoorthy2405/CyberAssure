<div class="flex h-screen bg-slate-950 text-white overflow-hidden">

    <!-- ══════════ SIDEBAR ══════════ -->
    <aside class="w-64 flex-shrink-0 bg-slate-900 border-r border-slate-800 flex flex-col">

        <!-- Logo -->
        <div class="px-6 py-6 border-b border-slate-800">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-sm font-bold">⬡</div>
                <div>
                    <div class="font-bold text-white text-sm">CyberAssure</div>
                    <div class="text-xs text-slate-400 uppercase tracking-wider">Underwriter Portal</div>
                </div>
            </div>
        </div>

        <!-- Nav -->
        <nav class="flex-1 px-3 py-6 space-y-1 overflow-y-auto">

            <div class="text-xs font-semibold text-slate-500 uppercase tracking-widest px-3 mb-3">Workspace</div>

            <a routerLink="/underwriter/queue" routerLinkActive="bg-slate-700 text-white"
                class="flex items-center justify-between gap-3 px-3 py-2.5 rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white transition-colors text-sm font-medium group">
                <div class="flex items-center gap-3">
                    <span class="text-base">📋</span>
                    <span>Review Queue</span>
                </div>
                <span *ngIf="pending > 0"
                    class="bg-amber-500 text-black text-xs font-bold px-2 py-0.5 rounded-full min-w-[20px] text-center">
                    {{pending}}
                </span>
            </a>

            <a routerLink="/underwriter/decisions" routerLinkActive="bg-slate-700 text-white"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white transition-colors text-sm font-medium">
                <span class="text-base">✅</span>
                <span>My Decisions</span>
            </a>

            <div class="text-xs font-semibold text-slate-500 uppercase tracking-widest px-3 mt-5 mb-3">Stats</div>

            <!-- Mini stats in sidebar -->
            <div class="mx-2 bg-slate-800/60 rounded-xl p-4 border border-slate-700/50 space-y-2 text-xs">
                <div class="flex justify-between">
                    <span class="text-slate-400">Total Assigned</span>
                    <span class="font-bold text-white">{{total}}</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-amber-400">Pending</span>
                    <span class="font-bold text-amber-400">{{pending}}</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-emerald-400">Approved</span>
                    <span class="font-bold text-emerald-400">{{approved}}</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-red-400">Rejected</span>
                    <span class="font-bold text-red-400">{{rejected}}</span>
                </div>
            </div>

        </nav>

        <!-- User info + Sign Out -->
        <div class="px-4 py-4 border-t border-slate-800">
            <div class="flex items-center gap-3 mb-3">
                <div
                    class="w-9 h-9 rounded-full bg-blue-600 flex items-center justify-center text-sm font-bold flex-shrink-0">
                    {{userInitial}}
                </div>
                <div class="overflow-hidden">
                    <div class="text-sm font-semibold text-white truncate">{{userName}}</div>
                    <div class="text-xs text-slate-400">Sr. Underwriter</div>
                </div>
            </div>
            <button (click)="signOut()"
                class="w-full flex items-center justify-center gap-2 px-3 py-2 rounded-xl border border-slate-700 text-slate-300 hover:bg-slate-800 transition text-xs font-medium">
                🚪 Sign Out
            </button>
        </div>

    </aside>

    <!-- ══════════ MAIN CONTENT ══════════ -->
    <main class="flex-1 overflow-y-auto bg-slate-950">
        <router-outlet></router-outlet>
    </main>

</div>
