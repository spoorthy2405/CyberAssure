<div class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col h-full shadow-xl z-20">

    <div routerLink="/customer/dashboard"
        class="p-6 flex items-center gap-3 text-white font-bold text-xl mb-4 cursor-pointer hover:opacity-80 transition-opacity">
        <div
            class="bg-blue-600 w-10 h-10 rounded-lg flex items-center justify-center font-bold text-lg shadow-lg shadow-blue-500/30">
            CA
        </div>
        <span>CyberAssure</span>
    </div>

    <nav class="flex-1 px-4 space-y-2 overflow-y-auto custom-scrollbar">

        <a routerLink="/customer/dashboard" routerLinkActive="bg-blue-600/10 text-blue-400 border-l-4 border-blue-500"
            [routerLinkActiveOptions]="{exact: true}"
            class="flex items-center gap-3 px-4 py-3 rounded-r-lg text-slate-300 hover:bg-slate-800 transition-colors border-l-4 border-transparent">
            <span class="text-lg">🏠</span> Dashboard
        </a>

        <a routerLink="/customer/policies" routerLinkActive="bg-blue-600/10 text-blue-400 border-l-4 border-blue-500"
            class="flex items-center gap-3 px-4 py-3 rounded-r-lg text-slate-300 hover:bg-slate-800 transition-colors border-l-4 border-transparent">
            <span class="text-lg">📋</span> Browse Policies
        </a>

        <a routerLink="/customer/subscriptions"
            routerLinkActive="bg-blue-600/10 text-blue-400 border-l-4 border-blue-500"
            class="flex items-center gap-3 px-4 py-3 rounded-r-lg text-slate-300 hover:bg-slate-800 transition-colors border-l-4 border-transparent">
            <span class="text-lg">🔎</span> My Subscriptions
        </a>

        <a routerLink="/customer/incidents" routerLinkActive="bg-blue-600/10 text-blue-400 border-l-4 border-blue-500"
            class="flex items-center gap-3 px-4 py-3 rounded-r-lg text-slate-300 hover:bg-slate-800 transition-colors border-l-4 border-transparent">
            <span class="text-lg">🚨</span> Incidents
        </a>

        <a routerLink="/customer/claims" routerLinkActive="bg-blue-600/10 text-blue-400 border-l-4 border-blue-500"
            class="flex items-center gap-3 px-4 py-3 rounded-r-lg text-slate-300 hover:bg-slate-800 transition-colors border-l-4 border-transparent">
            <span class="text-lg">💬</span> Claims
        </a>

        <a routerLink="/customer/risk" routerLinkActive="bg-blue-600/10 text-blue-400 border-l-4 border-blue-500"
            class="flex items-center gap-3 px-4 py-3 rounded-r-lg text-slate-300 hover:bg-slate-800 transition-colors border-l-4 border-transparent">
            <span class="text-lg">📊</span> Risk Assessment
        </a>

    </nav>

    <div class="p-4 border-t border-slate-800 bg-slate-900">
        <button (click)="logout()"
            class="w-full flex items-center justify-center gap-2 bg-slate-800/50 hover:bg-red-500/20 text-slate-300 hover:text-red-400 py-3 rounded-xl transition-all border border-slate-700 hover:border-red-500/50">
            <span>🚪</span> Logout
        </button>
    </div>

</div>
