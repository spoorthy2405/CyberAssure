<div class="w-64 bg-[#0B1220] border-r border-slate-800 flex flex-col h-full">

    <div routerLink="/"
        class="p-6 flex items-center gap-3 text-white font-bold text-xl mb-4 cursor-pointer hover:opacity-80 transition-opacity">
        <div
            class="bg-blue-600 w-10 h-10 rounded-lg flex items-center justify-center font-bold text-lg shadow-lg shadow-blue-500/30">
            CA
        </div>
        <span>CyberAssure</span>
    </div>

    <nav class="flex-1 px-4 space-y-2 overflow-y-auto custom-scrollbar">

        <a routerLink="/admin/dashboard" routerLinkActive="bg-blue-600/10 text-blue-400 border-l-4 border-blue-500"
            [routerLinkActiveOptions]="{exact: true}"
            class="flex items-center gap-3 px-4 py-3 rounded-r-lg text-slate-300 hover:bg-slate-800 transition-colors border-l-4 border-transparent">
            <span class="text-lg">🏠</span> Dashboard
        </a>

        <a routerLink="/admin/staff" routerLinkActive="bg-blue-600/10 text-blue-400 border-l-4 border-blue-500"
            class="flex items-center gap-3 px-4 py-3 rounded-r-lg text-slate-300 hover:bg-slate-800 transition-colors border-l-4 border-transparent">
            <span class="text-lg">👥</span> Staff Management
        </a>

        <a routerLink="/admin/underwriters" routerLinkActive="bg-blue-600/10 text-blue-400 border-l-4 border-blue-500"
            class="flex items-center gap-3 px-4 py-3 rounded-r-lg text-slate-300 hover:bg-slate-800 transition-colors border-l-4 border-transparent pl-8">
            <span class="text-sm">🛡️</span> Underwriters
        </a>

        <a routerLink="/admin/claims-officers"
            routerLinkActive="bg-blue-600/10 text-blue-400 border-l-4 border-blue-500"
            class="flex items-center gap-3 px-4 py-3 rounded-r-lg text-slate-300 hover:bg-slate-800 transition-colors border-l-4 border-transparent pl-8">
            <span class="text-sm">⚖️</span> Claims Officers
        </a>

        <a routerLink="/admin/customers" routerLinkActive="bg-blue-600/10 text-blue-400 border-l-4 border-blue-500"
            class="flex items-center gap-3 px-4 py-3 rounded-r-lg text-slate-300 hover:bg-slate-800 transition-colors border-l-4 border-transparent">
            <span class="text-lg">🏢</span> Customers
        </a>

        <a routerLink="/admin/policies" routerLinkActive="bg-blue-600/10 text-blue-400 border-l-4 border-blue-500"
            class="flex items-center gap-3 px-4 py-3 rounded-r-lg text-slate-300 hover:bg-slate-800 transition-colors border-l-4 border-transparent">
            <span class="text-lg">📦</span> Policies
        </a>

        <a routerLink="/admin/claims" routerLinkActive="bg-blue-600/10 text-blue-400 border-l-4 border-blue-500"
            class="flex items-center gap-3 px-4 py-3 rounded-r-lg text-slate-300 hover:bg-slate-800 transition-colors border-l-4 border-transparent">
            <span class="text-lg">🔎</span> Claims
        </a>

        <a routerLink="/admin/subscriptions" routerLinkActive="bg-blue-600/10 text-blue-400 border-l-4 border-blue-500"
            class="flex items-center gap-3 px-4 py-3 rounded-r-lg text-slate-300 hover:bg-slate-800 transition-colors border-l-4 border-transparent">
            <span class="text-lg">📋</span> Policy Applications
        </a>

        <a routerLink="/admin/risk-monitoring"
            routerLinkActive="bg-blue-600/10 text-blue-400 border-l-4 border-blue-500"
            class="flex items-center gap-3 px-4 py-3 rounded-r-lg text-slate-300 hover:bg-slate-800 transition-colors border-l-4 border-transparent">
            <span class="text-lg">📈</span> Risk Monitoring
        </a>

        <a routerLink="/admin/analytics" routerLinkActive="bg-blue-600/10 text-blue-400 border-l-4 border-blue-500"
            class="flex items-center gap-3 px-4 py-3 rounded-r-lg text-slate-300 hover:bg-slate-800 transition-colors border-l-4 border-transparent">
            <span class="text-lg">📊</span> Analytics
        </a>

        <div class="my-4 border-t border-slate-800"></div>

        <a routerLink="/admin/settings" routerLinkActive="bg-blue-600/10 text-blue-400 border-l-4 border-blue-500"
            class="flex items-center gap-3 px-4 py-3 rounded-r-lg text-slate-300 hover:bg-slate-800 transition-colors border-l-4 border-transparent">
            <span class="text-lg">⚙️</span> Settings
        </a>

    </nav>

    <div class="p-4 border-t border-slate-800">
        <button (click)="logout()"
            class="w-full flex items-center justify-center gap-2 bg-slate-800/50 hover:bg-red-500/20 text-slate-300 hover:text-red-400 py-3 rounded-lg transition-all border border-slate-700 hover:border-red-500/50">
            <span>🚪</span> Logout
        </button>
    </div>

</div>
