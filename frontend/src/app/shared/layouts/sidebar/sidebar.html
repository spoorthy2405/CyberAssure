<div class="w-64 bg-[#0B1220] border-r border-slate-800 flex flex-col h-full font-sans tracking-wide">

    <div routerLink="/"
        class="p-6 flex items-center gap-4 text-white font-bold text-xl mb-6 cursor-pointer hover:opacity-80 transition-opacity">
        <div
            class="bg-blue-600 w-9 h-9 rounded-sm flex items-center justify-center font-bold text-base shadow-sm">
            CA
        </div>
        <span class="tracking-tight">CyberAssure</span>
    </div>

    <nav class="flex-1 px-3 space-y-1.5 overflow-y-auto custom-scrollbar text-sm font-medium">

        <a routerLink="/admin/dashboard" routerLinkActive="bg-slate-800/80 text-white border-l-4 border-blue-500"
            [routerLinkActiveOptions]="{exact: true}"
            class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800/50 hover:text-slate-200 transition-all border-l-4 border-transparent">
            Dashboard Overview
        </a>

        <a routerLink="/admin/staff" routerLinkActive="bg-slate-800/80 text-white border-l-4 border-blue-500"
            class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800/50 hover:text-slate-200 transition-all border-l-4 border-transparent">
            Staff Management
        </a>

        <a routerLink="/admin/underwriters" routerLinkActive="bg-slate-800/80 text-white border-l-4 border-blue-500"
            class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800/50 hover:text-slate-200 transition-all border-l-4 border-transparent pl-8">
            Underwriters
        </a>

        <a routerLink="/admin/claims-officers"
            routerLinkActive="bg-slate-800/80 text-white border-l-4 border-blue-500"
            class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800/50 hover:text-slate-200 transition-all border-l-4 border-transparent pl-8">
            Claims Officers
        </a>

        <a routerLink="/admin/customers" routerLinkActive="bg-slate-800/80 text-white border-l-4 border-blue-500"
            class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800/50 hover:text-slate-200 transition-all border-l-4 border-transparent">
            Customers Directory
        </a>

        <a routerLink="/admin/policies" routerLinkActive="bg-slate-800/80 text-white border-l-4 border-blue-500"
            class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800/50 hover:text-slate-200 transition-all border-l-4 border-transparent">
            Policy Catalog
        </a>

        <a routerLink="/admin/claims" routerLinkActive="bg-slate-800/80 text-white border-l-4 border-blue-500"
            class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800/50 hover:text-slate-200 transition-all border-l-4 border-transparent">
            Claims Register
        </a>

        <a routerLink="/admin/subscriptions" routerLinkActive="bg-slate-800/80 text-white border-l-4 border-blue-500"
            class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800/50 hover:text-slate-200 transition-all border-l-4 border-transparent">
            Policy Applications
        </a>

        <a routerLink="/admin/risk-monitoring"
            routerLinkActive="bg-slate-800/80 text-white border-l-4 border-blue-500"
            class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800/50 hover:text-slate-200 transition-all border-l-4 border-transparent">
            Risk Monitoring
        </a>

        <a routerLink="/admin/analytics" routerLinkActive="bg-slate-800/80 text-white border-l-4 border-blue-500"
            class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800/50 hover:text-slate-200 transition-all border-l-4 border-transparent">
            Analytics & Reports
        </a>

    </nav>

    <div class="p-4 border-t border-slate-800 font-medium">
        <button (click)="logout()"
            class="w-full flex items-center justify-center gap-2 bg-slate-800/30 hover:bg-slate-800 text-slate-400 hover:text-white py-2.5 rounded-sm transition-all border border-slate-700 hover:border-slate-500 text-sm tracking-wide">
            Log Out
        </button>
    </div>

</div>
